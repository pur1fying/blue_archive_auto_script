name: Notify Kiramei fork to sync

on:
  push:
    branches:
      - master

permissions: {}

jobs:
  dispatch:
    # Run this job only in the upstream repository.
    if: github.repository == 'pur1fying/blue_archive_auto_script'

    runs-on: ubuntu-latest

    steps:
      - name: Trigger fork sync PR
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_TO_KIRAMEI_DEV_PAT }}
          EXPECTED_REPOSITORY: pur1fying/blue_archive_auto_script
          FORK_REPO: Kiramei/baas-dev
          EVENT_TYPE: upstream-master-push
        run: |
          set -euo pipefail

          # Extra runtime guard in case this workflow is copied or modified incorrectly.
          if [ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]; then
            echo "This workflow is intended to run only in ${EXPECTED_REPOSITORY}."
            echo "Current repository: ${GITHUB_REPOSITORY}"
            exit 0
          fi

          # Trigger a repository_dispatch event in the fork repository.
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${FORK_REPO}/dispatches" \
            -f event_type="${EVENT_TYPE}" \
            -F client_payload[upstream_sha]="${GITHUB_SHA}" \
            -F client_payload[upstream_ref]="${GITHUB_REF_NAME}"
