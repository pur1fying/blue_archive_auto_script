name: Code Quality

on:
  pull_request:
    branches:
      - dev/optim
  push:
    branches:
      - dev/optim

permissions:
  contents: read

jobs:
  service-tests:
    name: Service tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install service test dependencies
        run: python -m pip install -e ".[service,test]"

      - name: Run service tests
        run: python -m pytest tests/service -q
