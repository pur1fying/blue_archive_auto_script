name: Sync to CNB
on:
  workflow_dispatch:
  push:

jobs:
  sync_dev:
    name: Sync the Dev Version
    runs-on: ubuntu-latest
    if: github.repository == 'Kiramei/baas-dev'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Sync to CNB Repository
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            -e PLUGIN_TARGET_URL="https://cnb.cool/kiramei/baas-dev.git" \
            -e PLUGIN_AUTH_TYPE="https" \
            -e PLUGIN_USERNAME="cnb" \
            -e PLUGIN_PASSWORD=${{ secrets.CNB_SYNC_TOKEN }} \
            -e PLUGIN_FORCE="true" \
            tencentcom/git-sync

  sync_stable:
    name: Sync the Stable Version
    runs-on: ubuntu-latest
    if: github.repository == 'pur1fying/blue_archive_auto_script.git'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Sync to CNB Repository
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            -e PLUGIN_TARGET_URL="https://cnb.cool/pur1fying/blue_archive_auto_script.git" \
            -e PLUGIN_AUTH_TYPE="https" \
            -e PLUGIN_USERNAME="cnb" \
            -e PLUGIN_PASSWORD=${{ secrets.CNB_SYNC_TOKEN }} \
            -e PLUGIN_FORCE="true" \
            tencentcom/git-sync
