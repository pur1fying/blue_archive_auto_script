name: Open PR and try auto-merge upstream master

on:
  repository_dispatch:
    types: [upstream-master-push]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-master-pr
  cancel-in-progress: false

jobs:
  sync-pr-and-auto-merge:
    # Run this job only in the fork repository.
    if: github.repository == 'Kiramei/baas-dev'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          persist-credentials: false

      - name: Create or update sync PR, then try auto-merge
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_TO_KIRAMEI_DEV_PAT || github.token }}
          SYNC_TOKEN_KIND: ${{ secrets.UPSTREAM_TO_KIRAMEI_DEV_PAT != '' && 'pat' || 'github_token' }}
          EXPECTED_REPOSITORY: Kiramei/baas-dev
          UPSTREAM_REPO: pur1fying/blue_archive_auto_script
          UPSTREAM_BRANCH: master
          BASE_BRANCH: master
          SYNC_BRANCH: sync/upstream-master
        run: |
          set -euo pipefail

          # Extra runtime guard in case this workflow is copied or modified incorrectly.
          if [ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]; then
            echo "This workflow is intended to run only in ${EXPECTED_REPOSITORY}."
            echo "Current repository: ${GITHUB_REPOSITORY}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"
          git fetch origin "${BASE_BRANCH}"

          if [ "${SYNC_TOKEN_KIND}" != "pat" ] && git diff --name-only "origin/${BASE_BRANCH}" "upstream/${UPSTREAM_BRANCH}" -- .github/workflows | grep -q .; then
            echo "::error::Upstream contains workflow file changes, but UPSTREAM_TO_KIRAMEI_DEV_PAT is not configured. Add a PAT with repo and workflow scopes as this repository secret."
            exit 1
          fi

          # Skip if the fork base branch already contains the latest upstream branch.
          if git merge-base --is-ancestor "upstream/${UPSTREAM_BRANCH}" "origin/${BASE_BRANCH}"; then
            echo "fork ${BASE_BRANCH} already contains upstream/${UPSTREAM_BRANCH}. Nothing to do."
            exit 0
          fi

          # Update only the temporary sync branch. Do not modify the base branch directly.
          git checkout -B "${SYNC_BRANCH}" "upstream/${UPSTREAM_BRANCH}"
          git push origin "HEAD:${SYNC_BRANCH}" --force-with-lease

          existing_pr_url="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "${SYNC_BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json url \
            --jq '.[0].url // ""')"

          if [ -n "${existing_pr_url}" ]; then
            pr_url="${existing_pr_url}"
            echo "Existing sync PR updated: ${pr_url}"
          else
            pr_url="$(gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base "${BASE_BRANCH}" \
              --head "${SYNC_BRANCH}" \
              --title "Sync upstream master" \
              --body "Automated PR to sync changes from pur1fying/blue_archive_auto_script:master into Kiramei/baas-dev:master." \
              --json url \
              --jq '.url')"

            echo "Created sync PR: ${pr_url}"
          fi

          # Try to enable auto-merge or merge immediately if all requirements are already satisfied.
          # If this fails, keep the PR open for manual review.
          set +e
          gh pr merge "${pr_url}" \
            --repo "${GITHUB_REPOSITORY}" \
            --merge \
            --auto \
            --delete-branch

          merge_status=$?
          set -e

          if [ "${merge_status}" -eq 0 ]; then
            echo "Auto-merge enabled or PR merged: ${pr_url}"
          else
            echo "Auto-merge failed. Leaving PR open for manual review: ${pr_url}"

            gh pr comment "${pr_url}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body "Auto-merge failed. Please review manually. Possible causes: merge conflicts, failing checks, branch protection rules, or auto-merge not enabled for this repository." || true
          fi
